<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.min.css">
    <title>Luxurious Bridal Haven</title>
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <header class="header">
          <div class="header__inner">            
              <div class="header__logo" class="logo">
                <a class="header__logo-link" href="#">
                  <img src="../images/logo.svg" alt="bridal haven logo">
                </a>
              </div>
              <ul class="header__lang-list">
                <li class="header__lang-item">
                  <a class="header__lang-link" class="header__lang-link--active" href="#" 
                    type="lang" target="_blank" rel="noopener noreferrer">EN</a>/
                </li>
                <li class="header__lang-item">
                  <a class="header__lang-link" href="#" 
                    type="lang" target="_blank" rel="noopener noreferrer">UA</a>
                </li>
              </ul>            
              <nav class="header__nav">
                <ul class="header__nav-list">
                  <li class="header__nav-item">
                    <a class="header__nav-link" href="#" 
                    target="_blank" rel="noopener noreferrer">CATALOG</a>
                  </li>
                  <li class="header__nav-item">
                    <a class="header__nav-link" href="#" 
                    target="_blank" rel="noopener noreferrer">COLLECTIONS</a>
                  </li>
                  <li class="header__nav-item">
                    <a class="header__nav-link" href="#" 
                    target="_blank" rel="noopener noreferrer">ABOUT</a>
                  </li>
                  <li class="header__nav-item">
                    <a class="header__nav-link" href="#" 
                    target="_blank" rel="noopener noreferrer">BOOK AN APPOINTMENT</a>
                  </li>
                  <li class="header__nav-item">
                    <a class="header__nav-link" href="#">CONTACT</a>
                  </li>
                </ul>
              </nav>
              <ul class="header__actions-list">
                <li class="header__actions-user">
                  <a class="header__actions-link" href="#" 
                    target="_blank" rel="noopener noreferrer">
                    <svg width="24" height="24">
                      <use xlink:href="images/sprite.svg#user">
                      </use>
                    </svg>                 
                  </a>
                </li>
                <li class="header__actions-wishlist">
                  <a class="header__actions-link" href="#" 
                    target="_blank" rel="noopener noreferrer">
                    <svg width="24" height="21">
                      <use xlink:href="images/sprite.svg#wishlist">
                      </use>
                    </svg> 
                  </a>
                </li>
                <li class="header__actions-basket">
                  <a class="header__actions-link" href="#">
                    <svg width="24" height="24">
                      <use xlink:href="images/sprite.svg#shopping-bag">
                      </use>
                    </svg>
                  </a>
                </li>
              </ul>
          </div>
        </header>

      </div>
    
  


<main class="main">main</main>
 <footer class="footer">footer</footer>
 </div>
 <script src="js/main.min.js"></script>
  </body>
</html>
